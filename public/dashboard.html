<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Barcode Scanner - Dashboard</title>
  <!-- External libraries -->
  <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
  <script src="https://unpkg.com/@zxing/library@0.21.3/umd/index.min.js"></script>
  <!-- Custom CSS -->
  <link rel="stylesheet" href="styles.css">
  <style>
    .user-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 2px solid #e2e8f0;
    }
    .user-info {
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .user-name {
      font-weight: 600;
      color: #1a2b3c;
    }
    .logout-btn {
      background: #ef4444;
      color: white;
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 2rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    .logout-btn:hover {
      background: #dc2626;
    }
    .excel-note {
      font-size: 0.9rem;
      color: #059669;
      margin-top: 0.5rem;
    }
    .camera-area { 
      margin-bottom: 1rem; 
    }
    #videoPreview { 
      width: 100%; 
      height: 240px; 
      background: #000; 
      border-radius: 0.5rem; 
      object-fit: cover; 
      margin-bottom: 1rem;
    }
    /* Add these styles if not in styles.css */
    .file-label {
      display: inline-block;
      background: #3b82f6;
      color: white;
      padding: 0.75rem 1.5rem;
      border-radius: 2rem;
      cursor: pointer;
      font-weight: 500;
      margin-bottom: 1rem;
    }
    .file-label:hover {
      background: #2563eb;
    }
    input[type="file"] {
      display: none;
    }
    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
    }
    @media (max-width: 768px) {
      .grid-2 {
        grid-template-columns: 1fr;
      }
    }
    .extracted-panel {
      background: #f8fafc;
      border-radius: 1rem;
      padding: 1.5rem;
      margin-top: 1rem;
    }
    .label-sm {
      font-size: 0.875rem;
      color: #64748b;
      margin-bottom: 0.25rem;
    }
    .value-edit input {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid #e2e8f0;
      border-radius: 0.5rem;
      font-size: 1rem;
    }
    .date-picker {
      padding: 0.75rem;
      border: 1px solid #e2e8f0;
      border-radius: 0.5rem;
    }
    .primary {
      background: #10b981;
      color: white;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 2rem;
      font-weight: 600;
      cursor: pointer;
    }
    .primary:hover {
      background: #059669;
    }
    .badge {
      background: #e2e8f0;
      padding: 0.5rem 1rem;
      border-radius: 2rem;
      font-size: 0.875rem;
    }
    .table-wrapper {
      max-height: 400px;
      overflow-y: auto;
      border: 1px solid #e2e8f0;
      border-radius: 0.5rem;
      margin: 1rem 0;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th {
      background: #f1f5f9;
      padding: 0.75rem;
      text-align: left;
      position: sticky;
      top: 0;
    }
    td {
      padding: 0.75rem;
      border-bottom: 1px solid #e2e8f0;
    }
    .action-row {
      display: flex;
      justify-content: flex-end;
    }
    .download-btn {
      background: #3b82f6;
      color: white;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 2rem;
      cursor: pointer;
      font-weight: 600;
    }
    .download-btn:hover {
      background: #2563eb;
    }
    #clearTableBtn {
      background: #ef4444;
      color: white;
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 2rem;
      cursor: pointer;
    }
    #clearTableBtn:hover {
      background: #dc2626;
    }
    .msg {
      padding: 0.75rem;
      border-radius: 0.5rem;
      background: #fee2e2;
      color: #991b1b;
    }
    .msg.ok {
      background: #d1fae5;
      color: #065f46;
    }
    .spinner {
      display: inline-block;
      width: 1rem;
      height: 1rem;
      border: 2px solid #3b82f6;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 0.5rem;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .email-banner {
      background: #d1fae5;
      color: #065f46;
      padding: 0.75rem;
      border-radius: 0.5rem;
      margin-bottom: 1rem;
      font-weight: 600;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="card">
    <!-- banner shown briefly when export email is sent successfully -->
    <div id="emailBanner" class="email-banner" style="display:none;"></div>
    
    <div class="user-header">
      <h1>📷 Barcode Scanner</h1>
      <div class="user-info">
        <span class="user-name" id="userDisplay"></span>
        <a href="/admin.html" id="adminLink" style="display: none; margin-right: 1rem; color: #3b82f6; text-decoration: none; font-weight: 500;">👑 Admin Panel</a>
        <button class="logout-btn" onclick="logout()">Logout</button>
      </div>
    </div>

    <div class="grid-2">
      <!-- LEFT: upload & preview -->
      <div>
        <div class="camera-area">
          <video id="videoPreview" autoplay playsinline muted></video>
        </div>
        
        <div class="upload-area">
          <label for="barcodeFile" class="file-label">Choose image with barcode</label>
          <input type="file" id="barcodeFile" accept="image/*" capture="environment">
          
          <div class="image-preview" id="imagePreview">
            <span style="color:#7c8b9c;">preview will appear here</span>
          </div>
        </div>

        <!-- extracted info panel -->
        <div class="extracted-panel" id="extractPanel" style="display: none;">
          <div class="label-sm">📋 extracted value (auto‑filled)</div>
          <div class="value-edit">
            <input type="text" id="barcodeInput" placeholder="barcode value" value="">
          </div>
          <div style="margin-top: 12px;" class="label-sm">📅 calendar</div>
          <input type="date" id="datePicker" class="date-picker" style="width: 100%;">
          <div style="margin-top: 16px;">
            <button type="button" class="primary" id="addEntryBtn" style="width: 100%;">Add Entry</button>
          </div>
          <p style="font-size:0.8rem; margin-top:8px; color:#3b5f7a;">✨ after adding, everything resets – ready for next scan</p>
        </div>

        <!-- feedback area -->
        <div id="scanMessage" style="margin-top: 1rem; min-height: 2.5rem;"></div>
      </div>

      <!-- RIGHT: current entries & download -->
      <div>
        <div style="display: flex; justify-content: space-between; align-items: center;">
          <span class="badge" id="counterBadge">0 entries</span>
          <button id="clearTableBtn">🗑 clear my entries</button>
        </div>
        
        <div class="table-wrapper">
          <table id="dataTable">
            <thead>
              <tr>
                <th>Barcode</th>
                <th>Date</th>
                <th>User</th>
              </tr>
            </thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>
        
        <div class="action-row">
          <button id="downloadExcelBtn" class="download-btn">📧 Send Excel</button>
        </div>
        
        <div style="background: #f0f9fe; border-radius: 1rem; padding: 0.8rem 1rem; margin-top: 1.2rem;">
          <p class="excel-note">✓ Excel will be downloaded locally and emailed to admin</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Custom JavaScript -->
  <script src="app.js"></script>
</body>
</html>
